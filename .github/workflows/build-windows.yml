name: Build Windows x64

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64 Release
    runs-on: windows-latest-large
    timeout-minutes: 180
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install --local
          git lfs pull

      - name: Set CARGO_HOME
        run: echo "CARGO_HOME=C:\cargo" >> $env:GITHUB_ENV

      - name: Install Rust
        run: |
          rustup show
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x64

      - name: Install protoc
        run: choco install protoc -y

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo build deps
        run: |
          cargo binstall --force -y diesel_cli || echo "diesel_cli install failed, continuing"
        shell: bash

      - name: Build warp-oss binary
        run: cargo build --release --bin warp-oss --target x86_64-pc-windows-msvc
        timeout-minutes: 120

      - name: List build output
        run: |
          Get-ChildItem -Recurse target\x86_64-pc-windows-msvc\release\ -Include *.exe,*.dll | Select FullName,Length

      - name: Upload warp-oss.exe
        uses: actions/upload-artifact@v4
        with:
          name: warp-windows-x64
          path: |
            target/x86_64-pc-windows-msvc/release/warp-oss.exe
            target/x86_64-pc-windows-msvc/release/*.dll
          if-no-files-found: warn
          retention-days: 14
